services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wb_helper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    command: wb-helper-web

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: wb-helper-worker

volumes:
  postgres-data:

